services:
  weightcheck:
    build: .                        # 소스가 있는 빌드 호스트에서: docker compose up --build
    image: weight-check:latest      # 서버에서 tar.gz 로드 후: docker compose up -d (로드된 이미지 사용)
    container_name: weightcheck
    ports:
      - "8077:8077"
    volumes:
      - ./data:/data                # weights.db 영속 저장
    environment:
      - PORT=8077
      - WEIGHT_DB=/data/weights.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8077/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
